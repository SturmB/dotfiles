### KEYBINDINGS ###
###################

# ── Original default keybindings (replaced by Omarchy-style below) ──
# $mainMod = SUPER
# bind = $mainMod, Q, exec, $terminal
# bind = $mainMod, C, killactive,
# bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
# bind = $mainMod, E, exec, $fileManager
# bind = $mainMod, V, togglefloating,
# bind = $mainMod, R, exec, $menu
# bind = $mainMod, P, pseudo,
# bind = $mainMod, J, layoutmsg, togglesplit

# Omarchy-style keybindings — https://learn.omacom.io/2/the-omarchy-manual/53/hotkeys
$mainMod = SUPER

# ── Show keybindings ──
bind = $mainMod, K, exec, wofi -d --prompt "Keybindings" < ~/.config/hypr/keybindings.txt

# ── Navigating ──
bind = $mainMod, Space, exec, $menu
bind = $mainMod, Escape, exec, pidof wlogout && pkill wlogout || wlogout -p layer-shell
bind = $mainMod CTRL, L, exec, hyprlock
bind = $mainMod, W, killactive,
bind = CTRL ALT, Delete, exec, hyprctl dispatch closewindow address:*
bind = $mainMod, T, togglefloating,
bind = $mainMod, O, exec, hyprctl dispatch togglefloating && hyprctl dispatch pin active
bind = $mainMod, F, fullscreen, 0
bind = $mainMod ALT, F, fullscreen, 1

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Swap windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize windows
binde = $mainMod, equal, resizeactive, 30 0
binde = $mainMod, minus, resizeactive, -30 0
binde = $mainMod SHIFT, equal, resizeactive, 0 30
binde = $mainMod SHIFT, minus, resizeactive, 0 -30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1
bind = $mainMod CTRL, Tab, workspace, previous

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move workspace to other monitor
bind = $mainMod SHIFT ALT, left, movecurrentworkspacetomonitor, l
bind = $mainMod SHIFT ALT, right, movecurrentworkspacetomonitor, r
bind = $mainMod SHIFT ALT, up, movecurrentworkspacetomonitor, u
bind = $mainMod SHIFT ALT, down, movecurrentworkspacetomonitor, d

# Window grouping
bind = $mainMod, G, togglegroup,
bind = $mainMod ALT, G, moveoutofgroup,
bind = $mainMod ALT, Tab, changegroupactive, f
bind = $mainMod ALT, 1, changegroupactive, 1
bind = $mainMod ALT, 2, changegroupactive, 2
bind = $mainMod ALT, 3, changegroupactive, 3
bind = $mainMod ALT, 4, changegroupactive, 4
bind = $mainMod ALT, left, moveintogroup, l
bind = $mainMod ALT, right, moveintogroup, r
bind = $mainMod ALT, up, moveintogroup, u
bind = $mainMod ALT, down, moveintogroup, d
bind = $mainMod CTRL, left, movefocus, l
bind = $mainMod CTRL, right, movefocus, r
bind = $mainMod CTRL, up, movefocus, u
bind = $mainMod CTRL, down, movefocus, d

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod ALT, S, movetoworkspace, special:magic

# Zoom
bind = $mainMod CTRL, Z, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN{printf \"%.1f\", $(hyprctl getoption cursor:zoom_factor -j | grep -o '"float": [0-9.]*' | awk '{print $2}') + 0.5}")
bind = $mainMod CTRL ALT, Z, exec, hyprctl keyword cursor:zoom_factor 1

# Cycle monitor scaling
bind = $mainMod, slash, exec, ~/.config/hypr/scripts/cycle-scale.sh

# Scroll through workspaces with mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── System Controls ──
bind = $mainMod CTRL, A, exec, pavucontrol
bind = $mainMod CTRL, B, exec, $terminal -e bluetui
bind = $mainMod CTRL, W, exec, $terminal -e nmtui
bind = $mainMod CTRL, T, exec, $terminal -e btop

# ── 1Password ──
bind = CTRL SHIFT, Space, exec, 1password --quick-access

# ── App Launches ──
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, zen-browser
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod SHIFT, O, exec, obsidian
bind = $mainMod SHIFT, D, exec, $terminal -e lazydocker

# ── Clipboard ──
exec-once = wl-paste --watch cliphist store
bind = $mainMod CTRL, V, exec, cliphist list | wofi -d | cliphist decode | wl-copy

# ── Emoji Picker ──
bind = $mainMod, period, exec, smile

# ── Capture ──
bind = , Print, exec, mkdir -p ~/Pictures/Screenshots/$(date +%Y-%m) && grimblast save area - | satty -f - -o ~/Pictures/Screenshots/%Y-%m/Screenshot_%Y%m%d_%H%M%S.png --copy-command wl-copy --early-exit --disable-notifications
bind = SHIFT, Print, exec, mkdir -p ~/Pictures/Screenshots/$(date +%Y-%m) && grimblast save screen - | satty -f - -o ~/Pictures/Screenshots/%Y-%m/Screenshot_%Y%m%d_%H%M%S.png --copy-command wl-copy --early-exit --disable-notifications
bind = ALT, Print, exec, ~/.config/hypr/scripts/record.sh
bind = CTRL, Print, exec, mkdir -p ~/Pictures/Screenshots/$(date +%Y-%m) && sleep 3 && grim -c - | satty -f - -o ~/Pictures/Screenshots/%Y-%m/Screenshot_%Y%m%d_%H%M%S.png --copy-command wl-copy --early-exit --disable-notifications
bind = $mainMod, Print, exec, hyprpicker -a

# ── Notifications (swaync) ──
bind = $mainMod, comma, exec, swaync-client --close-latest
bind = $mainMod SHIFT, comma, exec, swaync-client --close-all
bind = $mainMod CTRL, comma, exec, swaync-client --toggle-dnd
bind = $mainMod ALT, comma, exec, swaync-client --toggle-panel

# ── Screen Annotation (Wayscriber) ──
bind = $mainMod, D, exec, wayscriber --daemon-toggle

# ── Style / Toggles ──
bind = $mainMod, BackSpace, exec, hyprctl setprop active opaque toggle
bind = $mainMod SHIFT, Space, exec, killall -SIGUSR1 waybar
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/restart-tray-apps.sh
bind = $mainMod CTRL, N, exec, pkill gammastep || gammastep -O 4500
bind = $mainMod CTRL, I, exec, pkill -SIGUSR1 hypridle || true

# ── Monitor Input Switching (DDC/CI) ──
bind = $mainMod CTRL ALT SHIFT, F12, exec, ddcutil --model "DELL U2723QE" setvcp 60 0x11 # Aurora (Dell HDMI-1)
bind = $mainMod CTRL ALT SHIFT, F11, exec, ddcutil --model "DELL U2723QE" setvcp 60 0x0f # Titan (Dell DP-1)

# ── Volume and brightness via SwayOSD ──
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ── Media keys ──
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Smile emoji picker
windowrule {
    name = smile-emoji-picker
    match:class = ^it\.mijorus\.smile$

    float = yes
    center = yes
}

# Satty screenshot annotation
windowrule {
    name = satty-float
    match:class = ^com\.gabm\.satty$

    float = yes
    center = yes
}

# PIA VPN — cap the tray popup height (XWayland, already floats)
windowrule {
    name = pia-vpn-popup
    match:class = privateinternetaccess
    max_size = 300 500
}

# JetBrains Toolbox — XWayland app overrides WM placement after map;
# windowrules alone can't stick. Use event listener to reposition.
windowrule {
    name = jetbrains-toolbox
    match:class = ^jetbrains-toolbox$

    float = yes
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Allow tearing for games (reduces input lag)
windowrule {
    name = gaming-tearing
    match:class = ^(steam_app_.*)$

    immediate = true
}