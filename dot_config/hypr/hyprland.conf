################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# monitor=,preferred,auto,auto
monitor = DP-1, preferred, 0x0, 1.066667       # MSI (left, primary)
monitor = DP-2, preferred, auto-right, 1.666667  # Dell (right)

xwayland {
    force_zero_scaling = true
}

# Bind workspaces to monitors: 1-5 on MSI, 6-10 on Dell
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-2, default:true
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = dolphin
$menu = hyprlauncher


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

# Propagate the Wayland session env (WAYLAND_DISPLAY, HYPRLAND_INSTANCE_SIGNATURE, …)
# to the systemd/D-Bus user manager FIRST, so D-Bus-activated services — notably
# xdg-desktop-portal's backends — can reach the compositor instead of failing with
# "Couldn't connect to a wayland compositor". Without this the portal stays down and
# GTK4 apps fall back to ~/.config/gtk-*/settings.ini (stale gtk-xft-dpi). Added 2026-06-14.
exec-once = dbus-update-activation-environment --systemd --all
# xdg-desktop-portal 1.22+ has Requisite=graphical-session.target, but bare Hyprland
# never activates that target, so the portal can't start (breaks GTK DPI fallback,
# file pickers, screenshots, screen-share). hyprland-session.target (in
# ~/.config/systemd/user/) pulls graphical-session.target up. Upstream: flatpak/xdg-desktop-portal#2020.
exec-once = systemctl --user start hyprland-session.target

exec-once = waybar
# exec-once = hyprpaper  # replaced by Azote — see Hyprland Wallpaper Setup note
exec-once = ~/.azotebg-hyprland
exec-once = swaync
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = swayosd-server
# Wake up ksecretd via the PAM-provided socket so org.freedesktop.secrets
# (KWallet's Secret Service bridge) is on the bus before clients like 1Password start.
# KDE/GNOME do this via /etc/xdg/autostart/pam_kwallet_init.desktop; Hyprland doesn't.
exec-once = /usr/lib/pam_kwallet_init
# Restore camera presets (cameractrls) — the daemon is WantedBy graphical-session.target,
# which KDE activates but Hyprland doesn't, so start it explicitly.
exec-once = systemctl --user start cameractrlsd.service
# Wayscriber (screen annotation) — also WantedBy graphical-session.target, same reason.
exec-once = systemctl --user start wayscriber.service

# Apps
# 1Password (Electron) creates its tray icon once at startup and doesn't retry
# if org.kde.StatusNotifierWatcher isn't on the bus yet. Because waybar (which
# owns that name) and 1password both launch from exec-once at the same moment,
# this is a race — lost after logout/login (warm cache), usually won on a cold
# reboot. Wait for the watcher to exist before launching.
exec-once = bash -c 'until busctl --user status org.kde.StatusNotifierWatcher &>/dev/null; do sleep 0.1; done; exec 1password --silent'
exec-once = arch-update --tray
exec-once = /opt/yubico-authenticator/authenticator --hidden
exec-once = dropbox
exec-once = easyeffects --gapplication-service
exec-once = espanso launcher
exec-once = env GDK_SCALE=1 /home/kerban/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox --minimize
exec-once = ~/.config/hypr/scripts/fix-toolbox.sh
exec-once = steam -silent
# Vesktop — wait for the StatusNotifierWatcher before launching. Electron 39
# creates its tray icon once at startup; even with ELECTRON_OZONE_PLATFORM_HINT
# set, if waybar hasn't claimed the watcher yet the SNI registration silently
# fails and the icon is missing. Same race as 1Password and PIA.
exec-once = bash -c 'until busctl --user status org.kde.StatusNotifierWatcher &>/dev/null; do sleep 0.1; done; exec env ELECTRON_OZONE_PLATFORM_HINT=auto /usr/lib/electron39/electron /usr/lib/vesktop/app.asar --start-minimized'
# exec-once = lan-mouse --daemon --capture-backend layer-shell
exec-once = ~/.config/hypr/scripts/pia-launch.sh
exec-once = sleep 5 && flatpak run com.core447.StreamController -b
exec-once = udiskie --tray


