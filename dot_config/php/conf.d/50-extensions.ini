; Shared PECL extensions for all mise-installed PHP versions.
; These must be installed via pecl after each new PHP version install.
; Run: ~/.config/php/install-extensions.sh

extension=igbinary.so
extension=imagick.so
extension=memcached.so
extension=msgpack.so
extension=opentelemetry.so
extension=pcov.so
extension=redis.so
extension=swoole.so
zend_extension=xdebug.so
