; Shared PHP configuration for all mise-installed PHP versions.
; Loaded via PHP_INI_SCAN_DIR in ~/.config/mise/config.toml.
; Mirrors the curated settings from the system /etc/php/php.ini.

[PHP]
memory_limit = -1
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED
log_errors = On
short_open_tag = Off
enable_dl = Off
register_argc_argv = Off
request_order = "GP"
variables_order = "GPCS"
zend.assertions = -1
zend.exception_ignore_args = On
zend.exception_string_param_max_len = 0

[pcov]
pcov.directory = .

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.huge_code_pages = 1
opcache.jit_buffer_size = 128M
opcache.jit = disable
opcache.memory_consumption = 128
opcache.revalidate_freq = 180
